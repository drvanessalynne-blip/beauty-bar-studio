<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO metadata below is static HTML, so it can't read src/config/business.ts directly.
      Currently points at the live Vercel deployment. If a custom domain is attached
      later, update every "https://beauty-bar-studio.vercel.app" URL in this file to
      match (and update business.siteUrl, robots.txt, sitemap.xml the same way).
    -->
    <title>Beauty Bar Studio | Luxury Salon &amp; Day Spa in Dallas, TX</title>
    <meta
      name="description"
      content="Beauty Bar Studio is a luxury beauty salon, premium day spa, and mini Pilates studio in Dallas, TX offering hair, brow microblading, nail bar, waxing, and bridal packages."
    />
    <link rel="canonical" href="https://beauty-bar-studio.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Beauty Bar Studio" />
    <meta property="og:title" content="Beauty Bar Studio | Luxury Salon &amp; Day Spa in Dallas, TX" />
    <meta
      property="og:description"
      content="A luxury beauty salon, premium day spa, and mini Pilates studio in Dallas, TX — hair, brow microblading, nail bar, waxing, and bridal packages."
    />
    <meta property="og:url" content="https://beauty-bar-studio.vercel.app/" />
    <meta property="og:image" content="https://beauty-bar-studio.vercel.app/og-image.jpg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beauty Bar Studio | Luxury Salon &amp; Day Spa in Dallas, TX" />
    <meta
      name="twitter:description"
      content="A luxury beauty salon, premium day spa, and mini Pilates studio in Dallas, TX — hair, brow microblading, nail bar, waxing, and bridal packages."
    />
    <meta name="twitter:image" content="https://beauty-bar-studio.vercel.app/og-image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
